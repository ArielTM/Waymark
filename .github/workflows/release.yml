      #   if: startsWith(github.ref, 'refs/tags/v')
      #   run: |
      #     xcrun notarytool submit "build/WindowMark-${{ steps.version.outputs.version }}-universal.dmg" \
      #       --apple-id "${{ secrets.APPLE_ID }}" \
      #       --team-id "${{ secrets.TEAM_ID }}" \
      #       --password "${{ secrets.APP_SPECIFIC_PASSWORD }}" \
      #       --wait
      #     xcrun stapler staple build/export/WindowMark.app
