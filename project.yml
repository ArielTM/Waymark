name: WindowMark
options:
  bundleIdPrefix: io.atrandom
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

targets:
  WindowMark:
    type: application
    platform: macOS
    sources:
      - WindowMark
    settings:
      base:
        CODE_SIGN_IDENTITY: "WindowMark Dev"
        CODE_SIGN_STYLE: Manual
        PRODUCT_BUNDLE_IDENTIFIER: io.atrandom.WindowMark
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: targeted
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        INFOPLIST_FILE: WindowMark/Info.plist
        CODE_SIGN_ENTITLEMENTS: WindowMark/WindowMark.entitlements
        COMBINE_HIDPI_IMAGES: true
      debug:
        ENABLE_HARDENED_RUNTIME: false
      release:
        ENABLE_HARDENED_RUNTIME: true
    entitlements:
      path: WindowMark/WindowMark.entitlements
      properties:
        com.apple.security.automation.apple-events: true
